<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layanan Chat</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#e5ddd5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.chat{
  width:100%;
  max-width:420px;
  height:90vh;
  background:#efeae2;
  display:flex;
  flex-direction:column;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.header{
  background:#075e54;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.messages{
  flex:1;
  padding:15px;
}

.bubble{
  background:white;
  padding:10px;
  border-radius:10px;
  width:fit-content;
  max-width:80%;
  margin-bottom:10px;
}

.form{
  display:flex;
  flex-direction:column;
  padding:10px;
  background:#f0f0f0;
  gap:8px;
}

input, textarea{
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
  outline:none;
}

button{
  background:#25d366;
  border:none;
  color:white;
  padding:10px;
  border-radius:20px;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="chat">

  <div class="header">
    💬 Layanan Informasi
  </div>

  <div class="messages">
    <div class="bubble">Halo 👋 Silakan kirim pesan kamu di sini</div>
    <div class="bubble">Pesan akan masuk ke admin via email</div>
  </div>

  <form class="form" action="https://formsubmit.co/irakhusnita98@gmail.com" method="POST">

    <input type="hidden" name="_subject" value="Chat Baru dari Website">
    <input type="hidden" name="_captcha" value="false">

    <input type="text" name="Nama" placeholder="Nama" required>
    <input type="email" name="Email" placeholder="Email" required>
    <textarea name="Pesan" placeholder="Tulis pesan..." required></textarea>

    <button type="submit">Kirim</button>

  </form>

</div>

</body>
</html>
