<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layanan Informasi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-card">
  <div class="header">
    <h2>💬 Layanan Informasi Bank Sampah AKTIF</h2>
    <p id="statusAdmin">Memuat status...</p>
  </div>

  <div class="bubble">👋 Halo, silakan sampaikan pertanyaan atau masukan Anda.</div>
  <div class="bubble">📧 Pesan akan langsung diteruskan ke admin.</div>

  <iframe name="hidden_iframe" style="display:none;"></iframe>

  <form action="https://formsubmit.co/irakhusnita98@gmail.com" method="POST" target="hidden_iframe" onsubmit="showPopup(); resetForm(this);">
    <input type="hidden" name="_subject" value="Chat Baru dari Website">
    <input type="hidden" name="_captcha" value="false">

    <input type="text" name="Nama" placeholder="Nama" required>
    <input type="email" name="Email" placeholder="Email" required>
    <textarea name="Pesan" rows="4" placeholder="Tulis pesan..." required></textarea>

    <button type="submit">Kirim Pesan</button>
  </form>
</div>

<div id="popup">
  <div class="popup-box">
    <h3>✅ Terima Kasih</h3>
    <p>Pesan berhasil dikirim.</p>
    <button onclick="closePopup()">Tutup</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
