<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layanan Informasi</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#e8f5e9;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
}

.box{
  width:90%;
  max-width:450px;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,.15);
}

h2{
  text-align:center;
  color:#2e7d32;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ccc;
  border-radius:8px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  background:#2ecc71;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#27ae60;
}

#popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
}

.popup-content{
  background:white;
  width:300px;
  margin:30vh auto;
  padding:20px;
  border-radius:12px;
  text-align:center;
}
</style>
</head>

<body>

<div class="box">
  <h2>Layanan Informasi</h2>

  <iframe name="hidden_iframe" style="display:none;"></iframe>

  <form
    action="https://formsubmit.co/irakhusnita98@gmail.com"
    method="POST"
    target="hidden_iframe"
    onsubmit="showPopup(); setTimeout(()=>this.reset(),500);">

    <input type="hidden" name="_subject" value="Pesan Baru dari Website">
    <input type="hidden" name="_captcha" value="false">

    <input type="text" name="Nama" placeholder="Nama" required>

    <input type="email" name="Email" placeholder="Email" required>

    <textarea name="Pesan" rows="5" placeholder="Tulis pesan..." required></textarea>

    <button type="submit">Kirim Pesan</button>
  </form>
</div>

<div id="popup">
  <div class="popup-content">
    <h3>✅ Terima Kasih</h3>
    <p>Pesan berhasil dikirim.</p>
    <button onclick="document.getElementById('popup').style.display='none'">
      Tutup
    </button>
  </div>
</div>

<script>
function showPopup(){
  setTimeout(function(){
    document.getElementById('popup').style.display='block';
  },500);
}
</script>

</body>
</html>
